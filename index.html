<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A glowing animated heart made from I love you text." />
    <title>For You ❤️</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="scene" aria-label="Romantic animated heart">
      <p class="eyebrow">for you ❤️</p>
      <section class="heart-stage" id="heartStage" aria-label="Tap the glowing heart">
        <div class="heart" id="heart" aria-hidden="true"></div>
        <div class="sparkles" id="sparkles" aria-hidden="true"></div>
      </section>
      <div class="love-note" aria-label="Personal message">
        <p class="hint">tap the heart</p>
        <p class="secret-message">you make my world softer ❤️</p>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
